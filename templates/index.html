<!DOCTYPE html>
<html>
<head>
    <title>RAG Document Question Answering</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f4f6f8; }
        h1 { color: #333; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 8px 15px; border: none; border-radius: 5px; background: #4CAF50; color: white; cursor: pointer; }
        button:hover { background: #45a049; }
        input, textarea { width: 100%; padding: 8px; margin-top: 8px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<h1>RAG Document Question Answering</h1>

<div class="box">
    <h3>Upload Document</h3>
    <input type="file" id="fileInput" onchange="showFileName()">
    <p id="fileName" style="font-size:14px;color:#555;"></p>
    <button onclick="uploadFile()">Upload</button>
    <p id="uploadStatus" style="font-weight:bold;"></p>
</div>

<div class="box">
    <h3>Ask Question</h3>
    <textarea id="question" rows="3" placeholder="Type your question here"></textarea>
    <button onclick="askQuestion()">Ask</button>
    <p><strong>Answer:</strong></p>
    <p id="answer"></p>
</div>

<script>
function showFileName() {
    let file = document.getElementById("fileInput").files[0];
    document.getElementById("fileName").innerText = "Selected file: " + file.name;
    document.getElementById("uploadStatus").innerText = "";
}

async function uploadFile() {
    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file first.");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let status = document.getElementById("uploadStatus");
    status.style.color = "blue";
    status.innerText = "Uploading and processing document...";

    try {
        let res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if (data.message.toLowerCase().includes("not readable")) {
            status.style.color = "red";
        } else {
            status.style.color = "green";
        }

        status.innerText = data.message;

    } catch (error) {
        status.style.color = "red";
        status.innerText = "Upload failed.";
    }
}

async function askQuestion() {
    let question = document.getElementById("question").value;

    if (!question.trim()) {
        alert("Enter a question first.");
        return;
    }

    document.getElementById("answer").innerText = "Generating answer...";

    let res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question})
    });

    let data = await res.json();
    document.getElementById("answer").innerText = data.answer;
}
</script>

</body>
</html>
